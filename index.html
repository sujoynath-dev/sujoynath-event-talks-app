<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Talks Today</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
            background-color: #f9f9f9;
        }
        h1, h2, h3 {
            color: #2c3e50;
        }
        h1 {
            text-align: center;
            border-bottom: 2px solid #3498db;
            padding-bottom: 0.5rem;
        }
        #search-container {
            text-align: center;
            margin: 2rem 0;
        }
        #search-input {
            padding: 0.5rem;
            width: 50%;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .schedule-container {
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .schedule-item {
            display: flex;
            padding: 1.5rem;
            border-bottom: 1px solid #eee;
        }
        .schedule-item:last-child {
            border-bottom: none;
        }
        .time {
            flex: 0 0 120px;
            font-weight: bold;
            color: #3498db;
        }
        .details {
            flex: 1;
        }
        .details h3 {
            margin-top: 0;
            color: #2980b9;
        }
        .speakers {
            font-style: italic;
            color: #555;
            margin-bottom: 0.5rem;
        }
        .categories {
            margin-top: 1rem;
        }
        .category {
            display: inline-block;
            background-color: #e7f3ff;
            color: #2980b9;
            padding: 0.25rem 0.75rem;
            border-radius: 15px;
            font-size: 0.8rem;
            margin-right: 0.5rem;
        }
        .lunch-break {
            background-color: #f0f0f0;
            font-weight: bold;
            justify-content: center;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <h1>Tech Talks Today</h1>

    <div id="search-container">
        <input type="text" id="search-input" placeholder="Search by category (e.g., AI, Web)...">
    </div>

    <div id="schedule" class="schedule-container"></div>

    <script>
        const talks = [
            {
                title: "The Future of Artificial Intelligence",
                speakers: ["Alex Doe"],
                categories: ["AI", "Machine Learning"],
                description: "A deep dive into the latest advancements in AI and what we can expect in the next decade. This talk explores neural networks, deep learning, and ethical considerations."
            },
            {
                title: "Modern Web Development with Serverless",
                speakers: ["Jane Smith", "John Appleseed"],
                categories: ["Web", "JavaScript", "Serverless"],
                description: "Learn how to build scalable and cost-effective web applications using serverless architectures. We'll cover Functions-as-a-Service, API gateways, and deployment strategies."
            },
            {
                title: "Cybersecurity in the Age of IoT",
                speakers: ["Sam Wilson"],
                categories: ["Security", "IoT"],
                description: "The Internet of Things brings new security challenges. This session will cover common vulnerabilities in IoT devices and best practices for securing your connected home and office."
            },
            {
                title: "Mastering Data Visualization",
                speakers: ["Emily White"],
                categories: ["Data", "UX"],
                description: "Turn complex datasets into beautiful and intuitive visualizations. We will explore principles of effective data storytelling and popular libraries like D3.js."
            },
            {
                title: "Introduction to Quantum Computing",
                speakers: ["Peter Jones", "Maria Garcia"],
                categories: ["Quantum", "Science"],
                description: "A beginner-friendly introduction to the mind-bending world of quantum computing. Learn about qubits, superposition, and entanglement, and their potential to revolutionize computing."
            },
            {
                title: "Building Resilient Distributed Systems",
                speakers: ["Chen Wei"],
                categories: ["Architecture", "Cloud"],
                description: "Discover patterns and strategies for designing and building systems that can withstand failures. This talk covers topics like microservices, service discovery, and circuit breakers."
            }
        ];

        const scheduleContainer = document.getElementById('schedule');
        const searchInput = document.getElementById('search-input');

        function formatTime(date) {
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function renderSchedule(filter = '') {
            scheduleContainer.innerHTML = '';
            let currentTime = new Date();
            currentTime.setHours(10, 0, 0, 0);

            const filteredTalks = talks.filter(talk => 
                filter === '' || talk.categories.some(cat => cat.toLowerCase().includes(filter.toLowerCase()))
            );

            let talkCounter = 0;
            for (let i = 0; i < 6; i++) {
                if (talkCounter === 3) {
                     // Lunch Break
                    const lunchStartTime = new Date(currentTime);
                    currentTime.setHours(currentTime.getHours() + 1);
                    const lunchEndTime = new Date(currentTime);
                    const lunchHtml = `
                        <div class="schedule-item lunch-break">
                            <div class="time">${formatTime(lunchStartTime)} - ${formatTime(lunchEndTime)}</div>
                            <div class="details">Lunch Break</div>
                        </div>
                    `;
                    scheduleContainer.insertAdjacentHTML('beforeend', lunchHtml);
                }

                const talk = talks[i];
                const startTime = new Date(currentTime);
                currentTime.setHours(currentTime.getHours() + 1);
                const endTime = new Date(currentTime);

                const isVisible = filter === '' || talk.categories.some(cat => cat.toLowerCase().includes(filter.toLowerCase()));

                const talkHtml = `
                    <div class="schedule-item ${isVisible ? '' : 'hidden'}" data-talk-index="${i}">
                        <div class="time">${formatTime(startTime)} - ${formatTime(endTime)}</div>
                        <div class="details">
                            <h3>${talk.title}</h3>
                            <div class="speakers">${talk.speakers.join(', ')}</div>
                            <p>${talk.description}</p>
                            <div class="categories">
                                ${talk.categories.map(cat => `<span class="category">${cat}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                `;
                scheduleContainer.insertAdjacentHTML('beforeend', talkHtml);
                
                // Add break
                if (i < 5 && i !== 2) {
                    currentTime.setMinutes(currentTime.getMinutes() + 10);
                } else if (i === 2) {
                     currentTime.setMinutes(currentTime.getMinutes());
                }
                talkCounter++;
            }
        }
        
        function handleSearch() {
            const filter = searchInput.value.trim().toLowerCase();
            const items = scheduleContainer.querySelectorAll('.schedule-item[data-talk-index]');
            
            items.forEach(item => {
                const index = parseInt(item.dataset.talkIndex, 10);
                const talk = talks[index];
                const isMatch = talk.categories.some(cat => cat.toLowerCase().includes(filter));
                
                if (isMatch || filter === '') {
                    item.classList.remove('hidden');
                } else {
                    item.classList.add('hidden');
                }
            });
        }

        searchInput.addEventListener('input', handleSearch);

        // Initial render
        renderSchedule();
    </script>
</body>
</html>
